<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mochiOS Policy</title>
    <meta name="description" content="mochiOS関連サービスの規約、プライバシーポリシー、開発者向けルールを掲載しています。">
    <link rel="stylesheet" href="/assets/base.css">
    <link rel="stylesheet" href="/assets/policy.css">
</head>
<body>
    <nav>
        <a class="nav-brand" href="/">
            <img src="/assets/mochimochi-kun.svg" width="30" height="30">
            <span>mochiOS Policy</span>
        </a>
    </nav>

    <div class="policy-layout">
        <aside class="policy-sidebar">
            <div class="sb-section">
                <div class="sb-label">Policy</div>
                <a class="sb-link" href="/" data-policy-link>Overview</a>
                <a class="sb-link" href="/privacy/" data-policy-link>Privacy</a>
                <a class="sb-link" href="/terms/" data-policy-link>Terms</a>
            </div>

            <div class="sb-section">
                <div class="sb-label">AppStore</div>
                <a class="sb-link" href="/appstore/developer-terms/" data-policy-link>Developer Terms</a>
                <a class="sb-link" href="/appstore/review-guidelines/" data-policy-link>Review Guidelines</a>
            </div>
        </aside>

        <main class="policy-main">
            <section class="policy-document">
                <header class="policy-hero">
                    <div class="policy-eyebrow" data-policy-eyebrow></div>
                    <h1 class="policy-title" data-policy-title></h1>
                    <p class="policy-subtitle" data-policy-subtitle></p>
                    <div class="policy-meta">
                        <span class="policy-pill" data-policy-updated></span>
                        <span class="policy-pill">日本語</span>
                    </div>
                </header>

                <div data-policy-content></div>

                <footer class="policy-footer">
                    <p>このページは mochiOS 関連サービスの方針文書です。内容に問題がある場合は運営者まで連絡してください。</p>
                </footer>
            </section>
        </main>
    </div>

    <script src="/assets/policy.js"></script>
</body>
</html>
