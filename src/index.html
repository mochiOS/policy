<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mochiOS Policies</title>
    <meta name="description" content="mochiOS関連サービスの規約、プライバシーポリシー、AppStore開発者規約、審査ガイドラインをまとめています。">
    <link rel="stylesheet" href="/assets/base.css">
    <link rel="stylesheet" href="/assets/policy.css">
</head>
<body>
    <nav>
        <a class="nav-brand" href="/">
            <img src="/assets/mochimochi-kun.svg" width="30" height="30" alt="">
            <span>mochiOS Policies | Terms and Guidlines</span>
        </a>
    </nav>

    <div class="policy-layout">
        <aside class="policy-sidebar" data-policy-sidebar></aside>

        <main class="policy-main">
            <section class="policy-document">
                <header class="policy-hero">
                    <div class="policy-eyebrow" data-policy-eyebrow></div>
                    <h1 class="policy-title" data-policy-title></h1>
                    <p class="policy-subtitle" data-policy-subtitle></p>
                    <div class="policy-meta">
                        <span class="policy-pill" data-policy-updated></span>
                        <span class="policy-pill" data-policy-category></span>
                    </div>
                </header>

                <div data-policy-content></div>

                <footer class="policy-footer">
                    <p>このページはmochiOS関連サービスの方針文書です。内容に問題がある場合は運営者まで連絡してください。</p>
                </footer>
            </section>
        </main>
    </div>

    <script src="/assets/policy.js"></script>
</body>
</html>
